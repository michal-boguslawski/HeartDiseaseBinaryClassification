target: TenYearCHD
random_state: 42
test_size: 0.2

model_name: XGBClassifier
model_params:
  n_estimators: 2000
  learning_rate: 0.002
  max_depth: 4
  min_child_weight: 5
  subsample: 0.8
  colsample_bytree: 1.
  gamma: 0.5
  reg_alpha: 0.5
  reg_lambda: 1
  objective: "binary:logistic"
  eval_metric: logloss
  random_state: 42
  n_jobs: 4
  scale_pos_weight: 5

evaluation:
  metrics: [auc, f1, accuracy, precision, recall, log_loss]
  log_metrics: [classification_report, confusion_matrix]
  plot_metrics: []

preprocessing_steps:
  name: Pipeline
  steps:
    - name: ColumnTransformer
      params:
        remainder: drop
        verbose_feature_names_out: False
      transformers:
        - columns: [BPMeds]
          transformer:
            name: SimpleImputer
            params:
              strategy: constant
              fill_value: 0

        - columns: [education]
          transformer:
            name: Pipeline
            steps:
              - name: SimpleImputer
                params:
                  strategy: constant
                  fill_value: 0

              - name: TargetEncoder
                params:
                  random_state: 42

        - columns: [BMI]
          transformer:
            name: Pipeline
            steps:
              - name: SimpleImputer
                params:
                  strategy: mean
              - name: Binarizer
                params:
                  threshold: 16

        - columns: [heartRate]
          transformer:
            name: Pipeline
            steps:
              - name: SimpleImputer
                params:
                  strategy: mean
              - name: Binarizer
                params:
                  threshold: 40

        - columns: [glucose]
          transformer:
            name: Pipeline
            steps:
              - name: SimpleImputer
                params:
                  strategy: mean
              - name: Binarizer
                params:
                  threshold: 120

        - columns: [male, currentSmoker, prevalentStroke, prevalentHyp, diabetes, age]
          transformer:
            name: passthrough
