target: TenYearCHD
random_state: 42
test_size: 0.2

model_name: RandomForestClassifier
model_params:
  n_estimators: 1000
  max_depth: 4
  min_samples_split: 100
  min_samples_leaf: 50
  max_features: sqrt
  bootstrap: True
  class_weight: balanced
  random_state: 42
  n_jobs: 4

evaluation:
  metrics: [auc, f1, accuracy, precision, recall, log_loss]
  log_metrics: [classification_report, confusion_matrix]
  plot_metrics: []

preprocessing_steps:
  name: Pipeline
  steps:
    - name: ColumnTransformer
      params:
        remainder: drop
        verbose_feature_names_out: False
      transformers:
        - columns: [BPMeds]
          transformer:
            name: SimpleImputer
            params:
              strategy: constant
              fill_value: 0

        - columns: [education]
          transformer:
            name: Pipeline
            steps:
              - name: SimpleImputer
                params:
                  strategy: constant
                  fill_value: 0

              - name: TargetEncoder
                params:
                  random_state: 42

        - columns: [BMI]
          transformer:
            name: SimpleImputer
            params:
              strategy: mean

        - columns: [heartRate]
          transformer:
            name: SimpleImputer
            params:
              strategy: mean

        - columns: [glucose]
          transformer:
            name: SimpleImputer
            params:
              strategy: mean

        - columns: [male, currentSmoker, prevalentStroke, prevalentHyp, diabetes, age]
          transformer:
            name: passthrough
